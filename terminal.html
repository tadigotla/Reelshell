(function(NX) {
  var SCHEMA_VERSION = 1;
  var PREFS_KEY = 'nexterm:prefs:v1';
  var DB_NAME = 'nexterm';
  var STORE = 'session';
  var RECORD_ID = 'current';
  var SAVE_DEBOUNCE_MS = 500;
  var FONT_MIN = 11;
  var FONT_MAX = 22;

  var saveTimer = null;
  var lastSaved = null;
  var lastSavedBytes = 0;

  function warn(msg, err) {

        document.documentElement.dataset.mode = data.mode;

        document.documentElement.style.setProperty('--output-font-size', data.fontSize + 'px');
      }

        NX.State.currentUser = data.user;
      }
      if (typeof data.cwd === 'string') {
        NX.State.cwd = data.cwd;
      }
      if (typeof data.recording === 'boolean' && NX.DVR && NX.DVR.setRecording) {
        NX.DVR.setRecording(data.recording);
      }
      NX.State.firstBootSeen = !!data.firstBootSeen;

      if (NX.Output && NX.Output.updatePrompt) NX.Output.updatePrompt();
    } catch (e) {
      warn('loadPrefsSync failed', e);

      loading = false;
    }

      var fontSize = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--output-font-size')) || 13.5;

        schemaVersion: SCHEMA_VERSION,
        theme: (NX.State.activeThemeName || 'GREEN').toLowerCase(),
        mode: document.documentElement.dataset.mode || 'dark',
        fontSize: fontSize,
        user: NX.State.currentUser,
        cwd: NX.State.cwd,
        recording: !!(NX.DVR && NX.DVR.recordingEnabled),
        firstBootSeen: !!NX.State.firstBootSeen,
      };
      localStorage.setItem(PREFS_KEY, JSON.stringify(payload));

      req.onupgradeneeded = function() {
        var db = req.result;

      req.onblocked = function() { reject(new Error('IndexedDB open blocked')); };

            resolve(false);
            return;
          }

            if (data.fs && NX.FS && NX.FS.setFS) NX.FS.setFS(data.fs);
            if (Array.isArray(data.history) && NX.History.replaceAll) NX.History.replaceAll(data.history);
            if (Array.isArray(data.snapshots) && NX.DVR.setSnapshots) NX.DVR.setSnapshots(data.snapshots);
            if (typeof data.currentScreen === 'string') {
              NX.DOM.output.innerHTML = data.currentScreen;
              NX.DOM.output.scrollTop = NX.DOM.output.scrollHeight;
            }
            if (typeof data.sessionStart === 'number') NX.State.sessionStart = data.sessionStart;

/* ── dvr.js ── */
(function(NX) {
  var MAX_SNAPSHOTS = 200;
  var snapshots = [];
  var snapshotIdx = -1;
  var isPlaying = false;
  var playTimer = null;
  var recordingEnabled = true;
  var PLAY_INTERVAL = 1200;

  function takeSnapshot() {
    if (!recordingEnabled) return;
    snapshots.push({ html: NX.DOM.output.innerHTML });
    if (snapshots.length > MAX_SNAPSHOTS) snapshots.splice(0, snapshots.length - MAX_SNAPSHOTS);
    if (snapshotIdx === -1) updateProgress();
  }

  function setSnapshots(newSnapshots) {
    snapshots = Array.isArray(newSnapshots) ? newSnapshots.slice() : [];
    if (snapshots.length > MAX_SNAPSHOTS) snapshots.splice(0, snapshots.length - MAX_SNAPSHOTS);
    snapshotIdx = -1;
    updateProgress();
    updatePlaybackUI();
  }

  function setRecording(value) {
    recordingEnabled = !!value;
    if (NX.DOM.btnRecord) NX.DOM.btnRecord.classList.toggle('active', recordingEnabled);
  }

  function goToSnapshot(idx) {
    if (snapshots.length === 0) return;
    idx = Math.max(0, Math.min(idx, snapshots.length - 1));
    snapshotIdx = idx;
    NX.DOM.output.innerHTML = snapshots[idx].html;
    NX.DOM.output.scrollTop = NX.DOM.output.scrollHeight;
    updateProgress();
    updatePlaybackUI();
  }

  function goLive() {
    if (snapshots.length === 0) return;
    snapshotIdx = -1;
    NX.DOM.output.innerHTML = snapshots[snapshots.length - 1].html;
    NX.DOM.output.scrollTop = NX.DOM.output.scrollHeight;
    stopPlayback();
    updateProgress();
    updatePlaybackUI();
  }

  function updateProgress() {
    var total = snapshots.length;
    var current = snapshotIdx === -1 ? total : snapshotIdx + 1;
    var pct = total === 0 ? 100 : (current / total) * 100;
    NX.DOM.progressFill.style.width = pct + '%';
    NX.DOM.progressLabel.textContent = current + ' / ' + total;
  }

  function updatePlaybackUI() {
    var inPlayback = snapshotIdx !== -1;
    NX.DOM.playbackBadge.classList.toggle('show', inPlayback || isPlaying);
    NX.DOM.statusDot.classList.toggle('playback', inPlayback);
    NX.DOM.statusMode.textContent = isPlaying ? 'PLAYING' : inPlayback ? 'PLAYBACK' : 'ACTIVE';
    NX.DOM.cmdInput.disabled = inPlayback;
    NX.DOM.cmdInput.placeholder = inPlayback ? '── playback mode ── press ⏩ to return to live' : "type 'help' to get started...";
    NX.DOM.btnPlay.classList.toggle('active', isPlaying);
    NX.DOM.btnPlay.classList.toggle('is-play', isPlaying);
    NX.DOM.btnPause.classList.toggle('active', inPlayback && !isPlaying);
  }

  function startPlayback() {
    if (snapshots.length === 0) return;
    if (snapshotIdx === -1) snapshotIdx = 0;
    isPlaying = true;
    updatePlaybackUI();
    playTimer = setInterval(function() {
      if (snapshotIdx >= snapshots.length - 1) { stopPlayback(); return; }
      snapshotIdx++;
      goToSnapshot(snapshotIdx);
    }, PLAY_INTERVAL);
  }

  function stopPlayback() {
    isPlaying = false;
    if (playTimer) { clearInterval(playTimer); playTimer = null; }
    updatePlaybackUI();
  }

  function wireTransport() {
    NX.DOM.btnRewind.addEventListener('click', function() { stopPlayback(); goToSnapshot(0); });
    NX.DOM.btnBack.addEventListener('click', function() {
      stopPlayback();
      var idx = snapshotIdx === -1 ? snapshots.length - 2 : snapshotIdx - 1;

      e.preventDefault();
      var partial = NX.DOM.cmdInput.value.trim().toLowerCase();
      var matches = Object.keys(NX.Commands.COMMANDS).filter(function(c) { return c.startsWith(partial); });
      if (matches.length === 1) { NX.DOM.cmdInput.value = matches[0] + ' '; NX.Autocomplete.hide(); }
    } else if (e.key === 'l' && e.ctrlKey) {
      e.preventDefault();
      NX.DOM.output.innerHTML = '';
    }
  });

  NX.DOM.cmdInput.addEventListener('input', function() {
    NX.Autocomplete.show(NX.DOM.cmdInput.value.split(' ')[0]);
  });

  NX.DOM.terminal.addEventListener('click', function(e) {
    if (!e.target.closest('.playback-surface')) NX.DOM.cmdInput.focus();
  });

  document.addEventListener('keydown', function(e) {
    if (document.activeElement === NX.DOM.cmdInput && NX.DVR.snapshotIdx === -1) return;
    if (e.key === 'Home') { e.preventDefault(); NX.DVR.stopPlayback(); NX.DVR.goToSnapshot(0); }
    if (e.key === 'End') { e.preventDefault(); NX.DVR.goLive(); }
    if (e.key === 'ArrowLeft' && document.activeElement !== NX.DOM.cmdInput) {
      e.preventDefault(); NX.DVR.stopPlayback();
      var idx = NX.DVR.snapshotIdx === -1 ? NX.DVR.snapshotCount - 2 : NX.DVR.snapshotIdx - 1;
      NX.DVR.goToSnapshot(Math.max(0, idx));
    }
    if (e.key === 'ArrowRight' && document.activeElement !== NX.DOM.cmdInput) {
      e.preventDefault(); NX.DVR.stopPlayback();
      if (NX.DVR.snapshotIdx === -1) return;
      if (NX.DVR.snapshotIdx >= NX.DVR.snapshotCount - 1) NX.DVR.goLive();
      else NX.DVR.goToSnapshot(NX.DVR.snapshotIdx + 1);
    }
    if (e.key === ' ' && NX.DVR.snapshotIdx !== -1) {
      e.preventDefault();
      NX.DVR.isPlaying ? NX.DVR.stopPlayback() : NX.DVR.startPlayback();
    }
  });

  NX.DOM.modeToggle.addEventListener('click', NX.Themes.toggleMode);

  var FONT_MIN = 11;
  var FONT_MAX = 22;
  var WHEEL_SCROLL_PER_PX = 12;
  var currentFontSize = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--output-font-size')) || 13.5;
  var dragStartY = 0;
  var dragStartSize = 0;

  var fontSaveTimer = null;
  function queueFontSave() {
    if (fontSaveTimer) clearTimeout(fontSaveTimer);
    fontSaveTimer = setTimeout(function() {
      fontSaveTimer = null;
      if (NX.Persist) NX.Persist.savePrefsSync();
    }, 200);
  }

  function applyFontSize(size) {
    currentFontSize = Math.max(FONT_MIN, Math.min(FONT_MAX, size));
    document.documentElement.style.setProperty('--output-font-size', currentFontSize + 'px');
    NX.DOM.fontKnobTooltip.textContent = Math.round(currentFontSize) + 'px';
    var offset = (currentFontSize - FONT_MIN) * WHEEL_SCROLL_PER_PX;
    NX.DOM.fontKnob.style.backgroundPositionY = '-' + offset + 'px';
  }
  applyFontSize(currentFontSize);

  function onFontDragMove(e) {
    var delta = dragStartY - e.clientY;
    applyFontSize(dragStartSize + delta * 0.06);
    queueFontSave();
  }
  function onFontDragEnd() {
    window.removeEventListener('mousemove', onFontDragMove);
    window.removeEventListener('mouseup', onFontDragEnd);
    setTimeout(function() { NX.DOM.fontKnobMount.classList.remove('dragging'); }, 600);
    queueFontSave();
  }
  NX.DOM.fontKnob.addEventListener('mousedown', function(e) {
    e.preventDefault();
    dragStartY = e.clientY;
    dragStartSize = currentFontSize;
    NX.DOM.fontKnobMount.classList.add('dragging');
    window.addEventListener('mousemove', onFontDragMove);
    window.addEventListener('mouseup', onFontDragEnd);
  });

  var DAY_NAMES   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  var MONTH_NAMES = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  function pad2(n) { return (n < 10 ? '0' : '') + n; }
  var clockTimer = null;
  function tickClock() {
    var d = new Date();
    NX.DOM.stardateClock.innerHTML =
      pad2(d.getHours()) +
      '<span class="stardate-clock-colon">:</span>' +
      pad2(d.getMinutes()) +
      '<span class="stardate-clock-colon">:</span>' +
      pad2(d.getSeconds());
    NX.DOM.stardateDow.textContent = DAY_NAMES[d.getDay()];
    NX.DOM.stardateDate.textContent = pad2(d.getDate()) + ' ' + MONTH_NAMES[d.getMonth()] + ' ' + d.getFullYear();
  }
  function startStardateTimers() {
    if (clockTimer === null) clockTimer = setInterval(tickClock, 1000);
  }
  function stopStardateTimers() {
    if (clockTimer !== null) { clearInterval(clockTimer); clockTimer = null; }
  }
  tickClock();
  startStardateTimers();
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'hidden') {
      stopStardateTimers();
    } else {
      tickClock();
      startStardateTimers();
    }
  });

  NX.Boot.start();
})(window.NX = window.NX || {});
</script>
</body>
</html>
